name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./store-app

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: store-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build APK
        run: npx eas build --platform android --profile preview --non-interactive --wait
        env:
          EXPO_TOKEN: QMJ2hOGxCsDkcCLI-zme-Bcfk15D2cHZbCnAVczd

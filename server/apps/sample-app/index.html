<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Sample App</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #1a1a2e;
    color: #eee;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
  }
  h1 { margin: 20px 0; font-size: 24px; color: #e94560; }
  .card {
    background: #16213e;
    border-radius: 16px;
    padding: 20px;
    margin: 10px 0;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
  }
  .card h2 { font-size: 18px; margin-bottom: 8px; color: #0f3460; }
  .card p { font-size: 14px; color: #aaa; line-height: 1.5; }
  button {
    background: #e94560;
    color: white;
    border: none;
    padding: 12px 24px;
    border-radius: 8px;
    font-size: 16px;
    margin: 10px 0;
    width: 100%;
    max-width: 400px;
  }
  button:active { opacity: 0.8; }
  .counter { font-size: 48px; margin: 20px 0; color: #e94560; }
  .footer { margin-top: auto; padding: 20px; font-size: 12px; color: #555; }
</style>
</head>
<body>
  <h1>Sample App</h1>
  <div class="card">
    <h2>Counter</h2>
    <p>This is a test mini-app running inside the store.</p>
    <div class="counter" id="count">0</div>
    <button onclick="increment()">Tap Me</button>
  </div>
  <div class="card">
    <h2>Info</h2>
    <p>This app is loaded from the personal app store server.</p>
  </div>
  <div class="footer">Personal App Store &copy; 2026</div>
  <script>
    let count = 0;
    function increment() {
      count++;
      document.getElementById('count').textContent = count;
    }
  </script>
</body>
</html>
